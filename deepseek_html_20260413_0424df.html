<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Ordino Yağcı Öneri Sistemi</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #fff5e6; margin: 0; padding: 12px; color: #b85c00; }
        .container { max-width: 750px; margin: 0 auto; }
        .tabs {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;
            background: #ffe8d4; padding: 10px; border-radius: 60px; position: sticky; top: 5px; z-index: 100;
        }
        .tab-btn {
            flex: 1; background: #ffdec2; border: none; padding: 14px 8px; border-radius: 50px;
            font-weight: bold; font-size: 0.85rem; color: #b85c00; min-height: 50px; cursor: pointer;
            transition: all 0.2s; text-align: center;
        }
        .tab-btn.active { background: #e67e22; color: white; }
        .tab-btn:active { transform: scale(0.97); }
        .tab-pane { display: none; background: #fffaf5; border-radius: 24px; padding: 20px 16px; margin-bottom: 20px; }
        .tab-pane.active { display: block; }
        h2 { font-size: 1.4rem; margin-top: 0; border-left: 5px solid #e67e22; padding-left: 12px; color: #cc7000; }
        h3 { color: #cc7000; margin: 16px 0 8px; }
        .form-card { background: #fff0e0; border-radius: 20px; padding: 16px; margin-bottom: 20px; }
        input, select {
            width: 100%; padding: 14px; margin: 8px 0 12px; border: 1px solid #e6a157;
            border-radius: 30px; font-size: 1rem; background: white; color: #b85c00;
        }
        button {
            background: #e67e22; color: white; border: none; padding: 14px 20px;
            border-radius: 40px; font-weight: bold; font-size: 1rem; cursor: pointer;
            min-height: 48px; margin: 5px 5px 0 0;
        }
        button:active { transform: scale(0.97); }
        button.danger { background: #c0392b; }
        button.secondary { background: #d97a1c; }
        .item-list { margin-top: 20px; border-top: 1px solid #f0c8a0; padding-top: 12px; max-height: 500px; overflow-y: auto; }
        .list-item { background: #fff5eb; border-radius: 20px; padding: 14px; margin-bottom: 12px; border: 1px solid #f0c8a0; }
        .list-item strong { color: #cc7000; }
        .flex-btns { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
        .flex-btns button { flex: 1; padding: 10px; font-size: 0.9rem; }
        .badge { background: #e67e22; color: white; border-radius: 30px; padding: 4px 12px; font-size: 0.7rem; display: inline-block; margin: 4px 4px 0 0; }
        .info-box { background: #ffefdb; padding: 12px; border-radius: 16px; margin-bottom: 16px; border-left: 4px solid #e67e22; }
        .recommend-card { background: #fff0e0; border-left: 6px solid #f1c40f; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #e67e22; color: white; padding: 12px 24px; border-radius: 50px; z-index: 2000; animation: fadeOut 2s forwards; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .backend-status {
            background: #e8f5e9; padding: 8px 16px; border-radius: 30px; font-size: 0.8rem;
            margin-bottom: 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
        }
        .status-online { color: #2e7d32; font-weight: bold; }
        .status-offline { color: #c62828; font-weight: bold; }
        @media (max-width: 550px) { .tab-btn { font-size: 0.7rem; padding: 12px 4px; } button { font-size: 0.85rem; padding: 12px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="backend-status" id="backendStatus">
        🔌 Backend Bağlantısı: <span id="statusText">Kontrol ediliyor...</span>
        <button onclick="checkBackend()" style="padding: 4px 12px; font-size: 0.7rem;">Yenile</button>
    </div>
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('gemiler')">🚢 Gemiler</button>
        <button class="tab-btn" onclick="switchTab('personeller')">👥 Personeller</button>
        <button class="tab-btn" onclick="switchTab('basmakinistler')">⚙️ Başmak.</button>
        <button class="tab-btn" onclick="switchTab('izin')">📅 İzin</button>
        <button class="tab-btn" onclick="switchTab('oneriler')">🎯 Öneri</button>
    </div>
    <div id="gemiler" class="tab-pane active">Yükleniyor...</div>
    <div id="personeller" class="tab-pane">Yükleniyor...</div>
    <div id="basmakinistler" class="tab-pane">Yükleniyor...</div>
    <div id="izin" class="tab-pane">Yükleniyor...</div>
    <div id="oneriler" class="tab-pane">Yükleniyor...</div>
</div>

<script>
    // 📌 BURAYI COLAB'DAN ALACAĞIN URL İLE DEĞİŞTİR
    let BACKEND_URL = "https://late-donuts-refuse.loca.lt/";  // <-- DEĞİŞTİR!
    
    let gemiler = [], personeller = [], basmakinistler = [], izinler = [];
    
    async function checkBackend() {
        const statusSpan = document.getElementById('statusText');
        try {
            const res = await fetch(`${BACKEND_URL}/api/gemiler`);
            if (res.ok) {
                statusSpan.innerHTML = '<span class="status-online">✅ Çevrimiçi</span>';
                return true;
            }
        } catch(e) {
            statusSpan.innerHTML = '<span class="status-offline">❌ Çevrimdışı - Colab çalışıyor mu?</span>';
        }
        return false;
    }
    
    function showToast(msg) { let t = document.createElement('div'); t.className = 'toast'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }
    
    async function fetchData() {
        const online = await checkBackend();
        if (!online) return;
        try {
            [gemiler, personeller, basmakinistler, izinler] = await Promise.all([
                fetch(`${BACKEND_URL}/api/gemiler`).then(r => r.json()),
                fetch(`${BACKEND_URL}/api/personeller`).then(r => r.json()),
                fetch(`${BACKEND_URL}/api/basmakinistler`).then(r => r.json()),
                fetch(`${BACKEND_URL}/api/izinler`).then(r => r.json())
            ]);
            renderAll();
        } catch(e) { console.error(e); }
    }
    
    function renderAll() { renderGemiler(); renderPersoneller(); renderBasmakinistler(); renderIzinler(); renderOneriSecenekleri(); }
    
    function renderGemiler() {
        let html = '<h2>Gemiler</h2><div class="form-card"><input type="text" id="gemiAdi" placeholder="Gemi Adi"><input type="text" id="makineTipi" placeholder="Makine Tipi"><select id="yagciSayisiTipi"><option value="tek">Tek Yagci</option><option value="cift">Cift Yagci</option></select><button onclick="gemiEkle()">+ Gemi Ekle</button></div><div class="item-list">';
        gemiler.forEach(g => { html += `<div class="list-item"><strong>${escapeHtml(g.ad)}</strong> | ${escapeHtml(g.makineTipi)} | ${g.yagciSayisiTipi}<div class="flex-btns"><button class="secondary" onclick="gemiDuzenle('${g.id}')">Duzenle</button><button class="danger" onclick="gemiSil('${g.id}')">Sil</button></div></div>`; });
        html += '</div>'; document.getElementById('gemiler').innerHTML = html;
    }
    
    function renderPersoneller() {
        let html = '<h2>Personeller</h2><div class="form-card"><input type="text" id="personelAd" placeholder="Ad Soyad"><select id="vardiyaTipi"><option value="izinci">Izinci</option><option value="grupcu">Grupcu</option><option value="sabit">Sabit</option><option value="tersane">Tersane</option></select><input type="text" id="vardiyaGunleri" placeholder="Vardiya Gunleri"><input type="text" id="bildigiMakine" placeholder="Bildigi Makine"><select id="mevcutGemi"><option value="">Atanmamis</option>${gemiler.map(g => `<option value="${escapeHtml(g.ad)}">${escapeHtml(g.ad)}</option>`).join('')}</select><button onclick="personelEkle()">+ Personel Ekle</button></div><div class="item-list">';
        personeller.forEach(p => { html += `<div class="list-item"><strong>${escapeHtml(p.adSoyad)}</strong> | ${p.vardiyaTipi} | Makine: ${escapeHtml(p.bildigiMakine)}<br>Mevcut Gemi: ${escapeHtml(p.mevcutGemi || 'Atanmamis')}<div class="flex-btns"><button class="secondary" onclick="personelDuzenle('${p.id}')">Duzenle</button><button class="danger" onclick="personelSil('${p.id}')">Sil</button></div></div>`; });
        html += '</div>'; document.getElementById('personeller').innerHTML = html;
    }
    
    function renderBasmakinistler() {
        let html = '<h2>Basmakinistler</h2><div class="form-card"><input type="text" id="bmAd" placeholder="Basmakinist Adi"><input type="text" id="bmMevcutGemi" placeholder="Mevcut Gemisi"><input type="text" id="sorunluYagci" placeholder="Sorunlu Yagci"><button onclick="bmEkle()">+ Basmakinist Ekle</button></div><div class="item-list">';
        basmakinistler.forEach(b => { html += `<div class="list-item"><strong>${escapeHtml(b.ad)}</strong> | Gemi: ${escapeHtml(b.mevcutGemi)} | Sorunlu: ${escapeHtml(b.sorunluYagci || 'Yok')}<div class="flex-btns"><button class="secondary" onclick="bmDuzenle('${b.id}')">Duzenle</button><button class="danger" onclick="bmSil('${b.id}')">Sil</button></div></div>`; });
        html += '</div>'; document.getElementById('basmakinistler').innerHTML = html;
    }
    
    function renderIzinler() {
        let html = '<h2>Izin Yonetimi</h2><div class="form-card"><select id="izinPersonelSec"><option value="">Personel Sec</option>${personeller.map(p => `<option value="${p.id}">${escapeHtml(p.adSoyad)}</option>`).join('')}</select><input type="date" id="izinBaslangic"><input type="date" id="izinBitis"><button onclick="izinEkle()">Izin Ekle</button></div><h3>Mevcut Izinler</h3><div class="item-list">';
        izinler.forEach(i => { let p = personeller.find(p => p.id === i.personelId); html += `<div class="list-item">${p ? escapeHtml(p.adSoyad) : 'Silinmis'} | ${i.baslangic} - ${i.bitis} (${i.gunSayisi} gun) <button class="danger" onclick="izinSil('${i.id}')">Iptal</button></div>`; });
        html += '</div>'; document.getElementById('izin').innerHTML = html;
    }
    
    function renderOneriSecenekleri() {
        let html = '<h2>Yagci Oneri</h2><div class="form-card"><div class="info-box">Izine cikan yagciyi secin</div><select id="izneCikanYagciSec"><option value="">-- Secin --</option>${personeller.map(p => `<option value="${p.id}">${escapeHtml(p.adSoyad)} (${escapeHtml(p.mevcutGemi || 'Atanmamis')})</option>`).join('')}</select><button onclick="oneriGetir()">Onerileri Getir</button></div><div id="oneriSonuclari" class="item-list"></div>';
        document.getElementById('oneriler').innerHTML = html;
    }
    
    async function gemiEkle() {
        let ad = document.getElementById('gemiAdi').value.trim();
        let makine = document.getElementById('makineTipi').value.trim();
        let tip = document.getElementById('yagciSayisiTipi').value;
        if (!ad || !makine) { alert('Gemi adi ve makine tipi gerekli'); return; }
        await fetch(`${BACKEND_URL}/api/gemiler`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: Date.now()+'-'+Math.random(), ad, makineTipi: makine, yagciSayisiTipi: tip }) });
        showToast('Gemi eklendi'); fetchData();
    }
    
    async function personelEkle() {
        let ad = document.getElementById('personelAd').value.trim();
        let tip = document.getElementById('vardiyaTipi').value;
        let vGun = document.getElementById('vardiyaGunleri').value;
        let makine = document.getElementById('bildigiMakine').value.trim();
        let mevcut = document.getElementById('mevcutGemi').value;
        if (!ad || !makine) { alert('Ad ve makine bilgisi zorunlu'); return; }
        await fetch(`${BACKEND_URL}/api/personeller`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: Date.now()+'-'+Math.random(), adSoyad: ad, vardiyaTipi: tip, vardiyaGunleriStr: vGun, bildigiMakine: makine, mevcutGemi: mevcut }) });
        showToast('Personel eklendi'); fetchData();
    }
    
    async function bmEkle() {
        let ad = document.getElementById('bmAd').value.trim();
        let gemi = document.getElementById('bmMevcutGemi').value.trim();
        let sorunlu = document.getElementById('sorunluYagci').value.trim();
        if (!ad) { alert('Basmakinist adi girin'); return; }
        await fetch(`${BACKEND_URL}/api/basmakinistler`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: Date.now()+'-'+Math.random(), ad, mevcutGemi: gemi, sorunluYagci: sorunlu }) });
        showToast('Basmakinist eklendi'); fetchData();
    }
    
    async function izinEkle() {
        let pid = document.getElementById('izinPersonelSec').value;
        let bas = document.getElementById('izinBaslangic').value;
        let bit = document.getElementById('izinBitis').value;
        if (!pid || !bas || !bit) { alert('Tum alanlari doldurun'); return; }
        let gun = Math.ceil((new Date(bit) - new Date(bas)) / (1000*60*60*24)) + 1;
        await fetch(`${BACKEND_URL}/api/izinler`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: Date.now()+'-'+Math.random(), personelId: pid, baslangic: bas, bitis: bit, gunSayisi: gun }) });
        showToast('Izin eklendi'); fetchData();
    }
    
    async function oneriGetir() {
        let yagciId = document.getElementById('izneCikanYagciSec').value;
        if (!yagciId) { alert('Lutfen izne cikan yagciyi secin'); return; }
        let res = await fetch(`${BACKEND_URL}/api/oneriler`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ izneCikanId: yagciId }) });
        let result = await res.json();
        if (result.hata) { document.getElementById('oneriSonuclari').innerHTML = `<div class="info-box">${result.hata}</div>`; return; }
        if (!result.enIyiler || result.enIyiler.length === 0) { document.getElementById('oneriSonuclari').innerHTML = `<div class="info-box">Uygun yagci bulunamadi</div>`; return; }
        let html = `<div class="info-box">Izine Cikan: ${escapeHtml(result.izneCikanAd)}<br>Gemisi: ${escapeHtml(result.hedefGemi.ad)} (${escapeHtml(result.hedefGemi.makineTipi)})</div><h3>EN IYI 5 YAGCI</h3>`;
        result.enIyiler.forEach((p, idx) => { html += `<div class="list-item recommend-card"><strong>${idx+1}. ${p.adSoyad}</strong><br><span class="badge">${p.vardiyaTipi}</span> Makine: ${escapeHtml(p.bildigiMakine)} | Puan: ${p.puan}</div>`; });
        if (result.enKotu) html += `<hr><div class="list-item" style="background:#ffe0e0;"><strong>EN DUSUK PUANLI:</strong> ${escapeHtml(result.enKotu.adSoyad)}</div>`;
        document.getElementById('oneriSonuclari').innerHTML = html;
    }
    
    async function gemiSil(id) { if(confirm('Sil?')){ await fetch(`${BACKEND_URL}/api/gemiler/${id}`, { method: 'DELETE' }); showToast('Silindi'); fetchData(); } }
    async function personelSil(id) { if(confirm('Sil?')){ await fetch(`${BACKEND_URL}/api/personeller/${id}`, { method: 'DELETE' }); showToast('Silindi'); fetchData(); } }
    async function bmSil(id) { if(confirm('Sil?')){ await fetch(`${BACKEND_URL}/api/basmakinistler/${id}`, { method: 'DELETE' }); showToast('Silindi'); fetchData(); } }
    async function izinSil(id) { await fetch(`${BACKEND_URL}/api/izinler/${id}`, { method: 'DELETE' }); showToast('Izin iptal'); fetchData(); }
    
    function gemiDuzenle(id) { let g = gemiler.find(g => g.id === id); if(g){ let yeniAd = prompt('Yeni ad', g.ad); if(yeniAd) g.ad = yeniAd; let yeniMak = prompt('Makine tipi', g.makineTipi); if(yeniMak) g.makineTipi = yeniMak; let yeniTip = prompt('Tek/Cift', g.yagciSayisiTipi); if(yeniTip === 'tek' || yeniTip === 'cift') g.yagciSayisiTipi = yeniTip; fetch(`${BACKEND_URL}/api/gemiler/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(g) }).then(() => fetchData()); } }
    function personelDuzenle(id) { let p = personeller.find(p => p.id === id); if(p){ p.adSoyad = prompt('Ad Soyad', p.adSoyad) || p.adSoyad; p.vardiyaTipi = prompt('Tip', p.vardiyaTipi) || p.vardiyaTipi; p.vardiyaGunleriStr = prompt('Vardiya Gunleri', p.vardiyaGunleriStr); p.bildigiMakine = prompt('Makine', p.bildigiMakine) || p.bildigiMakine; p.mevcutGemi = prompt('Mevcut Gemi', p.mevcutGemi); fetch(`${BACKEND_URL}/api/personeller/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(p) }).then(() => fetchData()); } }
    function bmDuzenle(id) { let b = basmakinistler.find(b => b.id === id); if(b){ b.ad = prompt('Ad', b.ad) || b.ad; b.mevcutGemi = prompt('Gemi', b.mevcutGemi); b.sorunluYagci = prompt('Sorunlu Yagci', b.sorunluYagci); fetch(`${BACKEND_URL}/api/basmakinistler/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(b) }).then(() => fetchData()); } }
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m) { if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m; }); }
    function switchTab(tabId) { document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active')); document.getElementById(tabId).classList.add('active'); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); }
    
    fetchData();
    setInterval(checkBackend, 30000);
</script>
</body>
</html>
